<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/weather.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <title>Weather App</title>
</head>

<body>
  <div class="top-anim">
    <div class="top-anim-line">
      <span class="anim-line left"></span>
      <span class="anim-line right"></span>
    </div>
  </div>
  <header>
    <div class="containerhome">
      <div class="logo">API$WEB</div>

      <nav class="nav-links" id="navLinks">
        <div class="nv-close">

        </div>
        <a href="index.html">Home</a>
        <a href="movie-search.html">Movies</a>
        <a href="translator.html">Translator</a>
        <a href="weather.html">Weather</a>
      </nav>

      <div class="menu-toggle" id="menuToggle">
        <i class="fa-solid fa-layer-group"></i>
      </div>
    </div>
  </header>

  <section>
    <div class="container weather-cont">
      <div class="card">
        <h2>🌦 Weather App</h2>

        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button>Search</button>

        <div class="result">
          <p class="label">City</p>
          <p id="cityName" class="city">Jaipur</p>

          <div class="weather-main">
            <img src="https://openweathermap.org/img/wn/01d@2x.png" id="weatherIcon" alt="Weather Icon">
            <p id="condition" class="condition">Clear Sky</p>
          </div>

          <p class="temp" id="temp"></p>

          <div class="extra-info">
            <div>
              <p class="label">Humidity</p>
              <p id="humidity">--%</p>
            </div>

            <div>
              <p class="label">Wind</p>
              <p id="wind">-- km/h</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <footer class="app-footer">
    <div class="container">
      <p>
        © <span id="year"></span> API$WEB • Built with ❤️ by Abhishek Kumawat
      </p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/weather.js"></script>

</body>

</html>
