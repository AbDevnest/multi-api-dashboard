<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/translator.css">


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <title>Translator App</title>
</head>

<body>
  <div class="top-anim">
    <div class="top-anim-line">
      <span class="anim-line left"></span>
      <span class="anim-line right"></span>
    </div>
  </div>
  <header>
    <div class="containerhome">
      <div class="logo">API$WEB</div>

      <nav class="nav-links" id="navLinks">
        <div class="nv-close">

        </div>
        <a href="index.html">Home</a>
        <a href="movie-search.html">Movies</a>
        <a href="translator.html">Translator</a>
        <a href="weather.html">Weather</a>
      </nav>

      <div class="menu-toggle" id="menuToggle">
        <i class="fa-solid fa-layer-group"></i>
      </div>
    </div>
  </header>

  <section>
    <div class="container">
      <div class="translator-card">
        <h2>Text Translator</h2>

        <label>Enter Text</label>
        <textarea id="inputText" placeholder="Type text here..."></textarea>

        <div class="lang-box">
          <select id="fromLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="it">Italian</option>
            <option value="ru">Russian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="zh-CN">Chinese</option>
          </select>

          <span>→</span>

          <select id="toLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="it">Italian</option>
            <option value="ru">Russian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="zh-CN">Chinese</option>
          </select>
        </div>

        <button id="translateBtn">Translate</button>

        <label>Translated Text</label>
        <textarea id="outputText" readonly></textarea>

      </div>
    </div>
  </section>

  <footer class="app-footer">
    <div class="container">
      <p>
        © <span id="year"></span> API$WEB • Built with ❤️ by Abhishek Kumawat
      </p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/translator.js"></script>

</body>

</html>
